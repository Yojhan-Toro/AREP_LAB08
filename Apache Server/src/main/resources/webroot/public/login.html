<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AREP Taller</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .login-box {
            max-width: 380px;
            margin: 80px auto;
            padding: 2rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #fff;
        }
        .login-box h2 { margin-bottom: 1.2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: #555; }
        .form-group input {
            width: 100%; padding: 8px 10px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 1rem; box-sizing: border-box;
        }
        .btn-login {
            width: 100%; padding: 10px; background: #2563eb; color: white;
            border: none; border-radius: 6px; font-size: 1rem; cursor: pointer;
        }
        .btn-login:hover { background: #1d4ed8; }
        #errorMsg { color: #dc2626; margin-top: 0.8rem; font-size: 0.9rem; min-height: 1.2rem; }
        #loadingMsg { color: #6b7280; margin-top: 0.5rem; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Iniciar sesión</h2>
    <p style="font-size:0.85rem;color:#888;margin-bottom:1rem;">
        Usuarios de prueba: <code>admin / admin123</code> &nbsp;|&nbsp; <code>user / user123</code>
    </p>

    <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div id="errorMsg"></div>
    <div id="loadingMsg"></div>
</div>

<script>
    // ✅ Servidor principal y de respaldo
    const API_URLS = [
        'http://localhost:5000',
        'http://localhost:5001'
    ];

    // Intenta una petición contra la lista de servidores en orden,
    // devuelve {url, response} del primero que responda
    async function fetchWithFallback(path, options = {}) {
        for (const base of API_URLS) {
            try {
                const res = await fetch(base + path, {
                    ...options,
                    signal: AbortSignal.timeout(3000) // 3s timeout por servidor
                });
                return res; // devuelve el primero que responda (aunque sea 401)
            } catch (e) {
                console.warn('[Fallback] ' + base + ' no disponible, probando siguiente...');
            }
        }
        throw new Error('Ningún servidor de autenticación está disponible');
    }

    // Al cargar: si ya hay token, valídalo contra algún servidor
    (async function checkExistingToken() {
        const savedToken = localStorage.getItem('session_token');
        if (!savedToken) return;
        try {
            const r = await fetchWithFallback('/api/me', {
                headers: { 'Authorization': 'Bearer ' + savedToken }
            });
            if (r.ok) {
                window.location.href = '/index.html';
            } else {
                localStorage.removeItem('session_token');
                localStorage.removeItem('session_user');
            }
        } catch (e) {
            localStorage.removeItem('session_token');
            localStorage.removeItem('session_user');
        }
    })();

    async function doLogin() {
        const username   = document.getElementById('username').value.trim();
        const password   = document.getElementById('password').value;
        const errorMsg   = document.getElementById('errorMsg');
        const loadingMsg = document.getElementById('loadingMsg');

        errorMsg.textContent = '';
        if (!username || !password) {
            errorMsg.textContent = 'Por favor ingresa usuario y contraseña.';
            return;
        }

        loadingMsg.textContent = 'Verificando...';

        try {
            const response = await fetchWithFallback('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();
            loadingMsg.textContent = '';

            if (response.ok) {
                localStorage.setItem('session_token', data.token);
                localStorage.setItem('session_user',  data.username);
                window.location.href = '/index.html';
            } else {
                errorMsg.textContent = data.error || 'Error al iniciar sesión.';
            }

        } catch (e) {
            loadingMsg.textContent = '';
            errorMsg.textContent = 'No se pudo conectar a ningún servidor de autenticación.';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('password')
            .addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });
</script>
</body>
</html>
